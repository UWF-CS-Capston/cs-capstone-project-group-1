name: Node Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: cd GymBuddy && npm install
      - run: cd GymBuddy && npm test
      env:
          JWT_SECRET: test-secret
